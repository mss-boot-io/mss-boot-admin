server:
  addr: 0.0.0.0:8080
  metrics: true
  healthz: true
  readyz: true
  pprof: true
application:
  mode: dev
  origin: http://127.0.0.1:8080
#  ui:
#    enabled: true
#    addr: 0.0.0.0:8000
#    path: dist
  staticPath:
    /public: public
  labels:
    app: mss-boot-admin
    namespace: local
    cluster: local
logger:
  path: logs
  stdout: file
  level: info
  json: false
  addSource: true
#  loki:
#    url: http://loki:3100
#    interval: 5s
database:
  driver: sqlite
  source: 'mss-boot-admin-local.db'
  name: mss-boot-admin-local
  config:
    disableForeignKeyConstraintWhenMigrating: true
  casbinModel: |
    [request_definition]
    r = sub, tp, obj, act

    [policy_definition]
    p = sub, tp, obj, act

    [policy_effect]
    e = some(where (p.eft == allow))

    [matchers]
    m = r.sub == p.sub && r.tp == p.tp && keyMatch(r.obj, p.obj) && regexMatch(r.act, p.act)
  timeout: 10s
auth:
  realm: 'mss-boot-admin zone'
  key: 'mss-boot-admin-secret'
  timeout: '12h'
  maxRefresh: '2160h'
  identityKey: 'mss-boot-admin-identity-key'
pyroscope:
  enabled: false
  applicationName: mss-boot-admin
  serverAddress: http://pyroscope:4040
cache:
  queryCache: false
  queryCacheDuration: 1h
  queryCacheKeys:
    - '*'
#  memory: ''
  redis:
    addr: '127.0.0.1:6379'
    password: 123456
queue:
  memory:
    poolSize: 10
notification:
  email:
    enabled: false
    host: ""
    port: 587
    username: ""
    password: ""
    from: ""
  dingtalk:
    enabled: false
    webhook: ""
    secret: ""
  wechat:
    enabled: false
    webhook: ""