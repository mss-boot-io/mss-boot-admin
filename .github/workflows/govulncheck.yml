name: govulncheck

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  schedule:
    - cron: "17 20 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run root govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
          repo-checkout: false
      - name: Run submodule govulncheck
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          for dir in cmd/tools/pr compose/consul compose/kafka; do
            (cd "$dir" && govulncheck ./...)
          done
